<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Sitenin Arka Planı ve Genel Ayarları */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e); /* Gece mavisi şık arka plan */
            color: white;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* Yazı Animasyonu */
        .pop-text {
            font-size: 4rem;
            color: #ff4757; /* Tatlı bir kırmızı */
            text-shadow: 3px 3px 15px rgba(255, 71, 87, 0.7), -2px -2px 10px #ffa502;
            margin-bottom: 20px;
            /* Başlangıçta görünmez ve çok küçük */
            opacity: 0;
            transform: scale(0.1);
            /* Patlama (pop) efekti */
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Fotoğraf Animasyonu */
        .pop-image {
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 6px solid #ffa502; /* Turuncu çerçeve */
            /* Başlangıçta görünmez ve çok küçük */
            opacity: 0;
            transform: scale(0.1);
            /* Yazıdan 0.5 saniye sonra patlayarak gelsin */
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s; 
        }

        /* Animasyonun Kendisi */
        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* Mobilde düzgün görünmesi için */
        @media (max-width: 600px) {
            .pop-text { font-size: 2.5rem; }
            .pop-image { max-width: 250px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="pop-text">Doğum Mübarek Olsun! 🎂</h1>
        
        <img src="https://hizliresim.com/8kudck4" alt="Doğum Günü Piçi" class="pop-image">
    </div>

    <script>
        // Sayfa yüklendiğinde konfetileri patlatacak JavaScript kodu
        window.onload = function() {
            var duration = 4000; // Konfetinin ne kadar süreceği (4 saniye)
            var end = Date.now() + duration;

            (function frame() {
                // Sol taraftan patlayan konfetiler
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 70,
                    origin: { x: 0 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#ffffff']
                });
                
                // Sağ taraftan patlayan konfetiler
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 70,
                    origin: { x: 1 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };
    </script>
</body>
</html>
